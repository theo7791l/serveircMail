{% extends "base.html" %}
{% block auth_content %}
<div class="auth-page">
  <div class="auth-card auth-card-wide">
    <div class="auth-logo">
      <div class="logo-icon-big"><i class="fa fa-user-plus"></i></div>
      <h1>Créer un compte</h1>
      <p>Rejoignez {{ site_name }}</p>
    </div>
    {% if error %}<div class="alert alert-error"><i class="fa fa-circle-xmark"></i> {{ error }}</div>{% endif %}
    <form method="post" action="/register" class="auth-form">
      <div class="form-row">
        <div class="form-group">
          <label><i class="fa fa-user"></i> Nom d'utilisateur</label>
          <input type="text" name="username" placeholder="identifiant_unique" required />
        </div>
        <div class="form-group">
          <label><i class="fa fa-id-card"></i> Nom affiché</label>
          <input type="text" name="display_name" placeholder="Votre prénom" required />
        </div>
      </div>
      <div class="form-group">
        <label><i class="fa fa-envelope"></i> Adresse email</label>
        <input type="email" name="email" placeholder="vous@domaine.com" required />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label><i class="fa fa-lock"></i> Mot de passe du site</label>
          <input type="password" name="password" placeholder="Min. 8 caractères" required />
        </div>
        <div class="form-group">
          <label><i class="fa fa-key"></i> Mot de passe mail (IMAP)</label>
          <input type="password" name="mail_password" placeholder="Optionnel si config globale" />
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full"><i class="fa fa-rocket"></i> Créer mon compte</button>
    </form>
    <div class="auth-footer">
      <a href="/login" class="link-accent"><i class="fa fa-arrow-left"></i> Déjà un compte ? Se connecter</a>
    </div>
  </div>
</div>
{% endblock %}
