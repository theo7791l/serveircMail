{% extends "base.html" %}
{% block content %}
<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;">
  <div class="card" style="max-width:420px;width:100%;padding:0;">
    <div style="padding:32px 32px 24px;text-align:center;border-bottom:1px solid var(--border);">
      <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:24px;color:white;margin:0 auto 16px;box-shadow:0 8px 32px rgba(108,99,255,0.3);">
        <i class="fa fa-envelope-circle-check"></i>
      </div>
      <h2 style="font-size:20px;font-weight:700;color:var(--text);margin-bottom:6px;">Vérification e-mail</h2>
      <p style="font-size:13px;color:var(--text-muted);">Un code à 6 chiffres a été envoyé à<br><strong style="color:var(--text);">{{ email }}</strong></p>
    </div>
    <div style="padding:24px 32px 32px;">
      {% if error %}
      <div style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#f87171;padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:8px;">
        <i class="fa fa-circle-xmark"></i> {{ error }}
      </div>
      {% endif %}
      <form method="post" action="/verify">
        <input type="hidden" name="email" value="{{ email }}">
        <div class="form-group">
          <label class="form-label">Code de vérification</label>
          <input class="form-input" style="text-align:center;font-size:28px;font-weight:700;letter-spacing:12px;" type="text" name="code" maxlength="6" placeholder="000000" autofocus autocomplete="one-time-code" inputmode="numeric" />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;"><i class="fa fa-check"></i> Confirmer mon compte</button>
      </form>
      <div style="text-align:center;margin-top:16px;">
        <a href="/register" style="font-size:12px;color:var(--text-muted);"><i class="fa fa-arrow-left"></i> Recommencer l'inscription</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
