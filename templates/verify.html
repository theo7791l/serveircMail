{% extends "base.html" %}
{% block auth_content %}
<div class="auth-page">
  <div class="auth-card" style="max-width:420px">
    <div class="auth-logo">
      <div class="auth-logo-icon" style="background:linear-gradient(135deg,var(--primary),var(--accent))"><i class="fa fa-envelope-circle-check"></i></div>
      <h1 class="auth-title">Vérification</h1>
      <p class="auth-subtitle">Un code à 6 chiffres a été envoyé à<br><strong style="color:var(--text)">{{ email }}</strong></p>
    </div>

    {% if error %}
    <div class="auth-error"><i class="fa fa-circle-xmark"></i> {{ error }}</div>
    {% endif %}

    <form method="post" action="/verify">
      <input type="hidden" name="email" value="{{ email }}" />
      <div class="form-group">
        <label class="form-label"><i class="fa fa-key"></i> Code de vérification</label>
        <input class="form-input" type="text" name="code"
          placeholder="123456"
          required maxlength="6" minlength="6"
          inputmode="numeric" pattern="[0-9]{6}"
          autofocus
          style="text-align:center;font-size:24px;font-weight:700;letter-spacing:8px" />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px">
        <i class="fa fa-check"></i> Confirmer mon compte
      </button>
    </form>

    <div class="auth-footer" style="font-size:12px;color:var(--text-dim)">
      Code valable 15 minutes &bull; <a href="/register">Recommencer</a>
    </div>
  </div>
</div>
{% endblock %}
