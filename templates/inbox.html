{% extends 'base.html' %}
{% block title %}Boite de réception — {{ site_name }}{% endblock %}
{% block page_title %}<i class="fa fa-inbox" style="color:var(--primary)"></i> Boîte de réception{% endblock %}
{% block topbar_actions %}
<button class="topbar-btn" onclick="toggleAIPanel()" title="Awlor AI" id="ai-toggle-btn" style="position:relative">
  <i class="fa fa-robot"></i>
  <span style="position:absolute;top:4px;right:4px;width:7px;height:7px;background:var(--accent3);border-radius:50%;border:1.5px solid var(--bg-dark);"></span>
</button>
<button class="topbar-btn" onclick="loadMails()" title="Rafraîchir"><i class="fa fa-rotate-right"></i></button>
<button class="topbar-btn" onclick="toggleFocusMode()" title="Focus Mode (F)" id="focus-btn"><i class="fa fa-expand"></i></button>
{% endblock %}
{% block content %}
<!-- COMMAND PALETTE -->
<div id="cmd-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);z-index:9000;align-items:flex-start;justify-content:center;padding-top:15vh;" onclick="closeCmdPalette()">
  <div style="width:600px;max-width:90vw;background:rgba(12,12,28,0.98);border:1px solid var(--border-glow);border-radius:var(--radius-lg);overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,0.7);" onclick="event.stopPropagation()">
    <div style="display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--border);">
      <i class="fa fa-magnifying-glass" style="color:var(--primary);font-size:18px;"></i>
      <input id="cmd-input" type="text" placeholder="Taper une commande ou chercher... (N=nouveau, R=répondre, F=focus, /=recherche)" autocomplete="off"
        style="flex:1;background:none;border:none;outline:none;font-size:16px;color:var(--text);font-family:var(--font);" oninput="filterCmds()" onkeydown="cmdKey(event)">
      <kbd style="background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:11px;color:var(--text-muted);">ESC</kbd>
    </div>
    <div id="cmd-results" style="max-height:340px;overflow-y:auto;"></div>
  </div>
</div>

<!-- FOCUS MODE OVERLAY -->
<div id="focus-overlay" style="display:none;position:fixed;inset:0;background:#000;z-index:8000;padding:60px;overflow-y:auto;">
  <button onclick="toggleFocusMode()" style="position:fixed;top:20px;right:24px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:Georgia,serif;font-size:13px;"><i class="fa fa-compress"></i> Quitter le focus</button>
  <div id="focus-content" style="max-width:720px;margin:0 auto;font-family:Georgia,'Times New Roman',serif;font-size:18px;line-height:1.9;color:#e8e8e0;"></div>
</div>

<div style="display:flex;gap:0;height:calc(100vh - 64px - 56px);position:relative;">

  <!-- SIDEBAR DOSSIERS -->
  <div style="width:220px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:rgba(10,10,31,0.5);">
    <div style="padding:16px 12px;">
      <a href="/compose" class="btn btn-primary" style="width:100%;justify-content:center;gap:8px;" onclick="addRipple(event)">
        <i class="fa fa-pen-to-square"></i> Nouveau mail
      </a>
    </div>
    <div style="padding:0 8px;flex:1;overflow-y:auto;">
      <div style="font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);padding:8px 8px 6px;">Dossiers</div>
      <div id="folderList"></div>
    </div>
    <div style="padding:12px;border-top:1px solid var(--border);">
      <div style="font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);padding:0 4px 8px;">Activité</div>
      <canvas id="heatmapCanvas" width="196" height="48" style="width:100%;border-radius:8px;opacity:0.8;"></canvas>
    </div>
  </div>

  <!-- MAIL LIST -->
  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;" id="mail-list-pane">
    <!-- Toolbar -->
    <div style="display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap;">
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="checkbox" id="selectAll" onchange="toggleSelectAll()" style="width:16px;height:16px;accent-color:var(--primary);cursor:pointer;" title="Tout sélectionner">
        <h2 id="folderTitle" style="font-size:14px;font-weight:700;white-space:nowrap;"><i class="fa fa-inbox" style="color:var(--primary)"></i> Inbox</h2>
        <span id="unreadBadge" class="nav-badge" style="display:none;"></span>
      </div>
      <div class="search-bar" style="flex:1;max-width:280px;">
        <input type="text" placeholder="Rechercher... (/)" id="searchInput" oninput="renderMails(currentMails)" />
        <i class="fa fa-magnifying-glass search-icon"></i>
      </div>
      <!-- Filtres -->
      <div style="display:flex;gap:6px;">
        <button class="btn btn-ghost btn-sm filter-btn active" data-filter="all" onclick="setFilter('all',this)">Tous</button>
        <button class="btn btn-ghost btn-sm filter-btn" data-filter="unread" onclick="setFilter('unread',this)">Non lus</button>
        <button class="btn btn-ghost btn-sm filter-btn" data-filter="starred" onclick="setFilter('starred',this)"><i class="fa fa-star"></i></button>
      </div>
      <!-- Actions de masse -->
      <div id="bulk-actions" style="display:none;gap:6px;display:none;">
        <button class="btn btn-ghost btn-sm" onclick="bulkMarkRead(true)"><i class="fa fa-eye"></i> Lu</button>
        <button class="btn btn-ghost btn-sm" onclick="bulkMarkRead(false)"><i class="fa fa-eye-slash"></i> Non lu</button>
        <button class="btn btn-danger btn-sm" onclick="bulkDelete()"><i class="fa fa-trash"></i></button>
      </div>
    </div>

    <div id="mailList" style="flex:1;overflow-y:auto;"></div>
    <div id="pagination" style="border-top:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:12px;"></div>
  </div>

  <!-- SPLIT VIEW PREVIEW -->
  <div id="split-pane" style="width:0;flex-shrink:0;border-left:1px solid var(--border);overflow-y:auto;transition:width 0.3s cubic-bezier(0.4,0,0.2,1);background:rgba(8,8,20,0.8);">
    <div id="split-content" style="padding:24px;min-height:100%;"></div>
  </div>

  <!-- AI PANEL -->
  <div id="ai-panel" style="width:0;flex-shrink:0;border-left:1px solid var(--border);overflow:hidden;transition:width 0.35s cubic-bezier(0.4,0,0.2,1);background:linear-gradient(180deg,rgba(8,8,24,0.97) 0%,rgba(10,6,28,0.97) 100%);display:flex;flex-direction:column;">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;">
      <div style="width:32px;height:32px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;"><i class="fa fa-robot"></i></div>
      <div style="flex:1;"><div style="font-size:14px;font-weight:700;">Awlor AI</div><div style="font-size:11px;color:var(--accent3);">Groq · Llama 3.3 70B</div></div>
      <button onclick="clearAIHistory()" title="Effacer l'historique" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;"><i class="fa fa-trash-can"></i></button>
    </div>
    <div id="ai-messages" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;"></div>
    <!-- Quick actions -->
    <div style="padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0;">
      <button class="btn btn-ghost btn-sm" style="font-size:11px;" onclick="aiQuick('Résume les derniers mails non lus')">Résumer</button>
      <button class="btn btn-ghost btn-sm" style="font-size:11px;" onclick="aiQuick('Détecte les spams dans ma boîte')">Anti-spam</button>
      <button class="btn btn-ghost btn-sm" style="font-size:11px;" onclick="aiQuick('Quelles actions dois-je faire aujourd\'hui ?')">Actions</button>
      <button class="btn btn-ghost btn-sm" style="font-size:11px;" onclick="aiQuick('Suggère des règles de tri pour mes mails')">Tri auto</button>
    </div>
    <div style="padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;">
      <div style="display:flex;gap:8px;align-items:flex-end;">
        <textarea id="ai-input" placeholder="Posez une question, demandez de rédiger un mail..." rows="2"
          style="flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;padding:10px 14px;resize:none;outline:none;font-family:var(--font);transition:var(--transition);"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAI();}"
          onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--border)'"></textarea>
        <button onclick="sendAI()" class="btn btn-primary btn-icon" style="flex-shrink:0;width:40px;height:40px;"><i class="fa fa-paper-plane"></i></button>
      </div>
    </div>
  </div>
</div>

<script>
let currentFolder = '{{ folder }}';
let currentPage = {{ page }};
let totalPages = 1;
let currentMails = [];
let selectedUids = new Set();
let starredUids = new Set();
let activeFilter = 'all';
let aiPanelOpen = false;
let splitPaneOpen = false;
let focusMode = false;
let aiLoading = false;
const folderIcons = { 'INBOX':'fa-inbox','Sent':'fa-paper-plane','Drafts':'fa-file-lines','Trash':'fa-trash','Spam':'fa-shield-virus','Archive':'fa-box-archive','Snoozed':'fa-clock','Starred':'fa-star' };

document.addEventListener('DOMContentLoaded', () => {
  loadFolders();
  loadMails();
  loadStats();
  loadStarred();
  loadAIHistory();
  drawHeatmap();
});

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.ctrlKey && e.key === 'k') { e.preventDefault(); openCmdPalette(); return; }
  if (e.key === 'n' || e.key === 'N') { window.location.href = '/compose'; return; }
  if (e.key === 'f' || e.key === 'F') { toggleFocusMode(); return; }
  if (e.key === '/') { e.preventDefault(); document.getElementById('searchInput').focus(); return; }
  if (e.key === 'Escape') { closeCmdPalette(); closeSplitPane(); return; }
});

// ===== COMMAND PALETTE =====
const COMMANDS = [
  { label: 'Nouveau mail', icon: 'fa-pen-to-square', action: () => window.location.href='/compose' },
  { label: 'Aller dans la boîte de réception', icon: 'fa-inbox', action: () => switchFolder('INBOX', null) },
  { label: 'Aller dans Envoyés', icon: 'fa-paper-plane', action: () => switchFolder('Sent', null) },
  { label: 'Aller dans Corbeille', icon: 'fa-trash', action: () => switchFolder('Trash', null) },
  { label: 'Aller dans Spam', icon: 'fa-shield-virus', action: () => switchFolder('Spam', null) },
  { label: 'Marquer tous comme lus', icon: 'fa-eye', action: () => bulkMarkRead(true) },
  { label: 'Ouvrir Awlor AI', icon: 'fa-robot', action: () => { if(!aiPanelOpen) toggleAIPanel(); } },
  { label: 'Focus Mode', icon: 'fa-expand', action: () => toggleFocusMode() },
  { label: 'Profil', icon: 'fa-user', action: () => window.location.href='/profile' },
  { label: 'Déconnexion', icon: 'fa-right-from-bracket', action: () => window.location.href='/logout' },
];

function openCmdPalette() {
  const el = document.getElementById('cmd-overlay');
  el.style.display = 'flex';
  document.getElementById('cmd-input').value = '';
  filterCmds();
  setTimeout(() => document.getElementById('cmd-input').focus(), 50);
}
function closeCmdPalette() { document.getElementById('cmd-overlay').style.display = 'none'; }
function filterCmds() {
  const q = document.getElementById('cmd-input').value.toLowerCase();
  const list = document.getElementById('cmd-results');
  const filtered = COMMANDS.filter(c => c.label.toLowerCase().includes(q));
  list.innerHTML = filtered.map((c,i) => `
    <div class="cmd-item" style="display:flex;align-items:center;gap:14px;padding:13px 20px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.15s;" 
      onmouseenter="this.style.background='var(--bg-card)'" onmouseleave="this.style.background='transparent'" onclick="runCmd(${i}, filtered_cmds)">
      <i class="fa ${c.icon}" style="color:var(--primary);width:16px;"></i>
      <span style="font-size:14px;">${c.label}</span>
    </div>`).join('');
  window.__filtered_cmds = filtered;
}
function runCmd(idx) {
  const cmds = window.__filtered_cmds;
  if (cmds && cmds[idx]) { closeCmdPalette(); cmds[idx].action(); }
}
function cmdKey(e) {
  if (e.key === 'Escape') { closeCmdPalette(); }
  if (e.key === 'Enter') {
    const items = document.querySelectorAll('#cmd-results .cmd-item');
    if (items.length > 0) { closeCmdPalette(); (window.__filtered_cmds || [])[0]?.action(); }
  }
}

// ===== FOLDERS =====
async function loadFolders() {
  const res = await fetch('/api/folders');
  const data = await res.json();
  const colorsRes = await fetch('/api/folder-colors');
  const colorsData = await colorsRes.json();
  const colors = colorsData.colors || {};
  const nav = document.getElementById('folderList');
  nav.innerHTML = '';
  data.folders.forEach(f => {
    const a = document.createElement('a');
    const color = colors[f] || null;
    a.className = 'nav-item' + (f === currentFolder ? ' active' : '');
    a.href = '#';
    a.style.cssText = color ? `--folder-accent:${color};` : '';
    const icon = folderIcons[f] || 'fa-folder';
    a.innerHTML = `<i class="fa ${icon} nav-icon" style="${color?`color:${color}`:''}" ></i><span style="flex:1;">${f}</span><span class="folder-badge-${f}" style="font-size:10px;color:var(--text-dim);"></span>`;
    a.onclick = e => { e.preventDefault(); switchFolder(f, a); };
    nav.appendChild(a);
  });
  // Load folder counts
  data.folders.forEach(async f => {
    try {
      const r2 = await fetch(`/api/stats?folder=${encodeURIComponent(f)}`);
      const d2 = await r2.json();
      const badge = document.querySelector(`.folder-badge-${f}`);
      if (badge && d2.unseen > 0) badge.textContent = d2.unseen;
    } catch {}
  });
}

async function switchFolder(folder, el) {
  currentFolder = folder; currentPage = 1; selectedUids.clear();
  document.querySelectorAll('#folderList .nav-item').forEach(i => i.classList.remove('active'));
  if (el) el.classList.add('active');
  const title = document.getElementById('folderTitle');
  title.innerHTML = `<i class="fa ${folderIcons[folder]||'fa-folder'}" style="color:var(--primary)"></i> ${folder}`;
  closeSplitPane();
  loadMails();
}

// ===== MAILS =====
async function loadMails() {
  showSkeleton();
  try {
    const res = await fetch(`/api/mails?folder=${encodeURIComponent(currentFolder)}&page=${currentPage}&per_page=20`);
    const data = await res.json();
    totalPages = data.pages;
    currentMails = data.mails;
    renderMails(currentMails);
    renderPagination(data.page, data.pages, data.total);
  } catch(e) {
    document.getElementById('mailList').innerHTML = `<div style="padding:40px;text-align:center;color:var(--accent2);"><i class="fa fa-circle-exclamation" style="font-size:32px;margin-bottom:12px;"></i><p>Erreur de chargement</p></div>`;
  }
}

function showSkeleton() {
  const list = document.getElementById('mailList');
  list.innerHTML = Array(6).fill(0).map(() => `
    <div style="display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--border);">
      <div class="skeleton" style="width:16px;height:16px;border-radius:4px;"></div>
      <div class="skeleton" style="width:32px;height:32px;border-radius:50%;flex-shrink:0;"></div>
      <div style="flex:1;">
        <div class="skeleton" style="width:40%;height:12px;margin-bottom:8px;"></div>
        <div class="skeleton" style="width:70%;height:10px;"></div>
      </div>
      <div class="skeleton" style="width:50px;height:10px;"></div>
    </div>`).join('');
}

function renderMails(mails) {
  const list = document.getElementById('mailList');
  const search = document.getElementById('searchInput').value.toLowerCase();
  let filtered = mails;
  if (search) filtered = mails.filter(m => m.subject.toLowerCase().includes(search) || m.from.toLowerCase().includes(search));
  if (activeFilter === 'unread') filtered = filtered.filter(m => !m.seen);
  if (activeFilter === 'starred') filtered = filtered.filter(m => starredUids.has(m.uid));
  if (!filtered.length) {
    list.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px;color:var(--text-muted);"><i class="fa fa-envelope-open" style="font-size:48px;opacity:0.15;"></i><p style="font-size:14px;">Aucun mail ici</p></div>`;
    return;
  }
  list.innerHTML = '';
  filtered.forEach((m, i) => {
    const isStarred = starredUids.has(m.uid);
    const isSelected = selectedUids.has(m.uid);
    const item = document.createElement('div');
    item.className = 'mail-item' + (m.seen ? '' : ' unread') + (isSelected ? ' selected' : '');
    item.style.cssText = `animation-delay:${i*30}ms;${isSelected?'background:rgba(108,99,255,0.12);border-left:3px solid var(--primary);':''}cursor:pointer;`;
    item.dataset.uid = m.uid;
    item.innerHTML = `
      <input type="checkbox" class="mail-checkbox" style="width:15px;height:15px;accent-color:var(--primary);flex-shrink:0;cursor:pointer;" ${isSelected?'checked':''}
        onclick="event.stopPropagation();toggleSelect('${m.uid}')">
      <button class="star-btn" style="background:none;border:none;cursor:pointer;font-size:16px;flex-shrink:0;padding:0 2px;transition:transform 0.2s;" 
        onclick="event.stopPropagation();toggleStar('${m.uid}','${currentFolder}',this)" title="${isStarred?'Retirer des favoris':'Ajouter aux favoris'}">
        <i class="fa${isStarred?'':'-regular'} fa-star" style="color:${isStarred?'var(--gold)':'var(--text-dim)'};"></i>
      </button>
      ${!m.seen ? '<span class="mail-unread-dot"></span>' : '<span style="width:8px;flex-shrink:0;"></span>'}
      <div class="avatar avatar-sm" style="background:linear-gradient(135deg,var(--primary),var(--accent2));flex-shrink:0;">${esc(m.from)[0].toUpperCase()}</div>
      <div class="mail-info" style="flex:1;min-width:0;" onclick="openMail(event,'${m.uid}','${m.from.replace(/'/g,\"\\'\")}')"> 
        <div class="mail-from">${esc(m.from)}</div>
        <div class="mail-subject">${esc(m.subject)}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;">
        <span class="mail-date">${fmtDate(m.date)}</span>
        <div style="display:flex;gap:4px;">
          <button title="Snooze" onclick="event.stopPropagation();openSnooze('${m.uid}')" style="background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:12px;opacity:0;transition:opacity 0.2s;" class="mail-action-btn"><i class="fa fa-clock"></i></button>
          <button title="Aperçu rapide" onclick="event.stopPropagation();openSplitPreview('${m.uid}','${m.from.replace(/'/g,\"\\'\")}')"
            style="background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:12px;opacity:0;transition:opacity 0.2s;" class="mail-action-btn"><i class="fa fa-eye"></i></button>
        </div>
      </div>`;
    item.onmouseenter = () => item.querySelectorAll('.mail-action-btn').forEach(b => b.style.opacity='1');
    item.onmouseleave = () => item.querySelectorAll('.mail-action-btn').forEach(b => b.style.opacity='0');
    list.appendChild(item);
  });
}

function openMail(e, uid, from) {
  if (e.target.closest('.mail-checkbox') || e.target.closest('.star-btn')) return;
  window.location.href = `/mail/${uid}?folder=${encodeURIComponent(currentFolder)}`;
}

// ===== STAR =====
async function toggleStar(uid, folder, btn) {
  const res = await fetch('/api/mails/star', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({uid,folder}) });
  const data = await res.json();
  if (data.starred) {
    starredUids.add(uid);
    btn.innerHTML = '<i class="fa fa-star" style="color:var(--gold);"></i>';
    btn.title = 'Retirer des favoris';
    showToast('Ajouté aux favoris', 'success');
  } else {
    starredUids.delete(uid);
    btn.innerHTML = '<i class="fa-regular fa-star" style="color:var(--text-dim);"></i>';
    btn.title = 'Ajouter aux favoris';
    showToast('Retiré des favoris', 'info');
  }
}

async function loadStarred() {
  try {
    const res = await fetch('/api/mails/starred');
    const data = await res.json();
    starredUids = new Set(data.starred.map(s => s.mail_uid));
  } catch {}
}

// ===== SELECTION =====
function toggleSelect(uid) {
  if (selectedUids.has(uid)) selectedUids.delete(uid);
  else selectedUids.add(uid);
  updateBulkActions();
  renderMails(currentMails);
}
function toggleSelectAll() {
  const all = document.getElementById('selectAll').checked;
  if (all) currentMails.forEach(m => selectedUids.add(m.uid));
  else selectedUids.clear();
  updateBulkActions();
  renderMails(currentMails);
}
function updateBulkActions() {
  const bulk = document.getElementById('bulk-actions');
  bulk.style.display = selectedUids.size > 0 ? 'flex' : 'none';
}

async function bulkMarkRead(read) {
  for (const uid of selectedUids) {
    await fetch('/api/mails/mark-read', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({uid,folder:currentFolder,seen:read}) });
  }
  showToast(`${selectedUids.size} mail(s) marqué(s) comme ${read?'lus':'non lus'}`, 'success');
  selectedUids.clear();
  loadMails();
}

async function bulkDelete() {
  if (!confirm(`Supprimer ${selectedUids.size} mail(s) ?`)) return;
  for (const uid of selectedUids) {
    await fetch(`/api/mails/${uid}/delete?folder=${encodeURIComponent(currentFolder)}`, { method:'DELETE' });
  }
  showToast(`${selectedUids.size} mail(s) supprimé(s)`, 'success');
  selectedUids.clear();
  loadMails();
}

// ===== FILTERS =====
function setFilter(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMails(currentMails);
}

// ===== SNOOZE =====
function openSnooze(uid) {
  const wake = prompt('Snooze jusqu\'à quelle date/heure ? (ex: 2026-03-16T09:00:00)');
  if (!wake) return;
  fetch('/api/mails/snooze', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({uid,folder:currentFolder,wake_at:wake}) })
    .then(() => showToast('Mail endormi jusqu\'à ' + wake, 'info'));
}

// ===== AI PANEL =====
function toggleAIPanel() {
  aiPanelOpen = !aiPanelOpen;
  const panel = document.getElementById('ai-panel');
  panel.style.width = aiPanelOpen ? '360px' : '0';
  document.getElementById('ai-toggle-btn').style.background = aiPanelOpen ? 'rgba(108,99,255,0.2)' : '';
  document.getElementById('ai-toggle-btn').style.borderColor = aiPanelOpen ? 'var(--primary)' : '';
}

async function sendAI() {
  const input = document.getElementById('ai-input');
  const msg = input.value.trim();
  if (!msg || aiLoading) return;
  input.value = '';
  appendAIMsg('user', msg);
  aiLoading = true;
  const typingId = appendAIMsg('assistant', '<span class="ai-typing"><i></i><i></i><i></i></span>', true);
  try {
    const res = await fetch('/api/ai/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({message:msg}) });
    const data = await res.json();
    document.getElementById(typingId)?.remove();
    appendAIMsg('assistant', data.response || data.detail || 'Erreur');
  } catch(e) {
    document.getElementById(typingId)?.remove();
    appendAIMsg('assistant', 'Erreur de connexion à Awlor AI.');
  }
  aiLoading = false;
}

function aiQuick(prompt) {
  document.getElementById('ai-input').value = prompt;
  sendAI();
  if (!aiPanelOpen) toggleAIPanel();
}

function appendAIMsg(role, content, isTyping = false) {
  const msgs = document.getElementById('ai-messages');
  const div = document.createElement('div');
  const id = 'ai-msg-' + Date.now();
  div.id = id;
  const isUser = role === 'user';
  div.style.cssText = `display:flex;gap:10px;align-items:flex-start;animation:mailItemIn 0.3s ease;${isUser?'flex-direction:row-reverse;':''}`;
  div.innerHTML = `
    <div style="width:28px;height:28px;border-radius:8px;background:${isUser?'linear-gradient(135deg,var(--primary),var(--accent2))':'linear-gradient(135deg,#1a1a3e,var(--primary))'};display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;">
      <i class="fa ${isUser?'fa-user':'fa-robot'}"></i>
    </div>
    <div style="flex:1;background:${isUser?'rgba(108,99,255,0.12)':'rgba(255,255,255,0.04)'};border:1px solid ${isUser?'rgba(108,99,255,0.25)':'var(--border)'};border-radius:${isUser?'12px 4px 12px 12px':'4px 12px 12px 12px'};padding:10px 14px;font-size:13px;line-height:1.6;word-break:break-word;white-space:pre-wrap;">${content}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return id;
}

async function loadAIHistory() {
  try {
    const res = await fetch('/api/ai/history');
    const data = await res.json();
    data.history.forEach(m => appendAIMsg(m.role, m.content));
    if (!data.history.length) appendAIMsg('assistant', 'Bonjour ! Je suis Awlor AI. Je peux résumer vos mails, détecter le spam, rédiger des réponses, traduire ou trier votre boîte. Comment puis-je vous aider ?');
  } catch {}
}

async function clearAIHistory() {
  await fetch('/api/ai/history', { method:'DELETE' });
  document.getElementById('ai-messages').innerHTML = '';
  appendAIMsg('assistant', 'Historique effacé. Comment puis-je vous aider ?');
  showToast('Historique IA effacé', 'info');
}

// ===== HEATMAP =====
function drawHeatmap() {
  const canvas = document.getElementById('heatmapCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const data = Array(24).fill(0).map(() => Math.floor(Math.random()*10));
  const max = Math.max(...data, 1);
  const barW = canvas.width / 24;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  data.forEach((v, i) => {
    const h = (v / max) * canvas.height;
    const alpha = 0.2 + (v/max) * 0.8;
    ctx.fillStyle = `rgba(108,99,255,${alpha})`;
    ctx.beginPath();
    ctx.roundRect(i*barW+1, canvas.height-h, barW-2, h, 2);
    ctx.fill();
  });
}

// ===== PAGINATION =====
function renderPagination(page, pages, total) {
  const pg = document.getElementById('pagination');
  if (pages <= 1) { pg.innerHTML = `<span style="font-size:12px;color:var(--text-muted);">${total} mail${total>1?'s':''}</span>`; return; }
  pg.innerHTML = `
    <button class="btn btn-ghost btn-sm" onclick="goPage(${page-1})" ${page<=1?'disabled':''}><i class="fa fa-chevron-left"></i></button>
    <span style="font-size:12px;color:var(--text-muted);">${page} / ${pages}</span>
    <button class="btn btn-ghost btn-sm" onclick="goPage(${page+1})" ${page>=pages?'disabled':''}><i class="fa fa-chevron-right"></i></button>`;
}
function goPage(p) { if (p<1||p>totalPages) return; currentPage=p; loadMails(); }

async function loadStats() {
  try {
    const res = await fetch('/api/stats');
    const data = await res.json();
    const b = document.getElementById('unreadBadge');
    if (data.unseen > 0) { b.textContent = data.unseen; b.style.display = 'inline-flex'; }
    document.getElementById('unread-badge') && (document.getElementById('unread-badge').textContent = data.unseen > 0 ? data.unseen : '');
    document.getElementById('unread-badge') && (document.getElementById('unread-badge').style.display = data.unseen > 0 ? 'inline-flex' : 'none');
  } catch {}
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d) {
  if (!d) return '';
  try {
    const date = new Date(d), now = new Date(), diff = now - date;
    if (diff < 86400000) return date.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    if (diff < 604800000) return date.toLocaleDateString('fr-FR',{weekday:'short'});
    return date.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});
  } catch { return d; }
}
