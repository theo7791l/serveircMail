{% extends 'base.html' %}
{% block title %}Connexion - {{ site_name }}{% endblock %}
{% block content %}
<div class="login-wrapper">
    <div class="login-card" data-animate="fadeInUp">
        <div class="login-logo">
            <div class="logo-icon">
                <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="48" height="48" rx="16" fill="url(#grad1)"/>
                    <path d="M8 16l16 12 16-12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                    <rect x="8" y="14" width="32" height="20" rx="3" stroke="white" stroke-width="2.5"/>
                    <defs>
                        <linearGradient id="grad1" x1="0" y1="0" x2="48" y2="48">
                            <stop offset="0%" stop-color="#6C63FF"/>
                            <stop offset="100%" stop-color="#3EC6E0"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <h1 class="logo-text">{{ site_name }}</h1>
            <p class="logo-sub">Votre messagerie personnelle</p>
        </div>
        {% if request.query_params.get('error') %}
        <div class="alert alert-error" data-animate="shake">
            <span>🔒</span> Mot de passe incorrect, réessayez.
        </div>
        {% endif %}
        <form class="login-form" method="POST" action="/login">
            <div class="field-group">
                <label class="field-label">Adresse mail</label>
                <div class="field-input-wrap">
                    <span class="field-icon">✉️</span>
                    <input class="field-input" type="text" value="{{ request.query_params.get('email', '') }}" name="username" placeholder="vous@youtube.serveirc.com" autocomplete="username" readonly>
                </div>
            </div>
            <div class="field-group">
                <label class="field-label">Mot de passe</label>
                <div class="field-input-wrap">
                    <span class="field-icon">🔑</span>
                    <input class="field-input" type="password" name="password" placeholder="••••••••••" autocomplete="current-password" required autofocus>
                    <button type="button" class="toggle-pass" onclick="togglePass(this)">👁</button>
                </div>
            </div>
            <button type="submit" class="btn-login">
                <span class="btn-text">Se connecter</span>
                <span class="btn-arrow">→</span>
            </button>
        </form>
    </div>
</div>
<script>
function togglePass(btn) {
    const input = btn.parentElement.querySelector('input');
    input.type = input.type === 'password' ? 'text' : 'password';
    btn.textContent = input.type === 'password' ? '👁' : '🙈';
}
</script>
{% endblock %}
