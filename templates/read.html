{% extends 'base.html' %}
{% block title %}Lecture - {{ site_name }}{% endblock %}
{% block content %}
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <div class="s-logo-icon">✉</div>
                <span class="s-logo-text">{{ site_name }}</span>
            </div>
        </div>
        <div class="user-badge">
            <div class="user-avatar">{{ email[0].upper() if email else '?' }}</div>
            <div class="user-info">
                <span class="user-email">{{ email }}</span>
                <span class="user-status"><span class="status-dot"></span> En ligne</span>
            </div>
        </div>
        <button class="btn-compose" onclick="window.location='/compose'">✏️ Nouveau mail</button>
        <nav class="sidebar-nav">
            <a class="nav-item" href="/inbox"><span class="nav-icon">📥</span><span>Boîte de réception</span></a>
            <a class="nav-item" href="/compose"><span class="nav-icon">✏️</span><span>Rédiger</span></a>
        </nav>
        <div class="sidebar-footer">
            <a href="/logout" class="btn-logout">🚪 Déconnexion</a>
        </div>
    </aside>
    <main class="main-content read-view">
        <div class="read-toolbar">
            <a href="javascript:history.back()" class="btn-back">← Retour</a>
            <div class="read-actions" id="readActions"></div>
        </div>
        <div class="read-card" id="mailCard">
            <div class="loading-screen"><div class="loader"></div><p>Chargement du mail...</p></div>
        </div>
    </main>
</div>
<script>
const uid = {{ uid }};
const folder = '{{ folder }}';

document.addEventListener('DOMContentLoaded', () => {
    loadMail();
});

async function loadMail() {
    const res = await fetch(`/api/mail/${uid}?folder=${encodeURIComponent(folder)}`);
    const m = await res.json();
    if (m.error) {
        document.getElementById('mailCard').innerHTML = `<div class="empty-state"><div class="empty-icon">❌</div><p>${m.error}</p></div>`;
        return;
    }
    document.getElementById('readActions').innerHTML = `
        <button class="btn-action" onclick="replyMail()">↩️ Répondre</button>
        <button class="btn-action btn-delete" onclick="deleteMail()">🗑️ Supprimer</button>
    `;
    const card = document.getElementById('mailCard');
    card.innerHTML = `
        <div class="read-meta" data-animate="fadeInDown">
            <div class="read-subject">${escHtml(m.subject)}</div>
            <div class="read-from">
                <div class="read-avatar">${m.from[0].toUpperCase()}</div>
                <div>
                    <div class="read-from-name">${escHtml(m.from)}</div>
                    <div class="read-date">${m.date}</div>
                </div>
            </div>
            <div class="read-to">À : ${escHtml(m.to)}</div>
        </div>
        <div class="read-body" data-animate="fadeInUp">
            ${m.body_html
                ? `<iframe class="mail-iframe" srcdoc="${escAttr(m.body_html)}" sandbox="allow-same-origin"></iframe>`
                : `<pre class="mail-text">${escHtml(m.body_text)}</pre>`
            }
        </div>
    `;
    requestAnimationFrame(() => card.querySelectorAll('[data-animate]').forEach(el => el.classList.add('in')));
}

function replyMail() {
    const subj = document.querySelector('.read-subject')?.textContent || '';
    const from = document.querySelector('.read-from-name')?.textContent || '';
    window.location = `/compose?reply_to=${encodeURIComponent(from)}&subject=${encodeURIComponent('Re: '+subj)}`;
}

async function deleteMail() {
    if (!confirm('Supprimer ce mail ?')) return;
    const res = await fetch(`/api/mail/${uid}/delete?folder=${encodeURIComponent(folder)}`, {method:'POST'});
    const data = await res.json();
    if (data.success) window.location = '/inbox';
}

function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
    return String(s).replace(/"/g,'&quot;');
}
</script>
{% endblock %}
