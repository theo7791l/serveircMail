{% extends 'base.html' %}
{% block title %}Lecture — {{ site_name }}{% endblock %}
{% block page_title %}<i class="fa fa-envelope-open" style="color:var(--primary)"></i> Lecture{% endblock %}
{% block topbar_actions %}
<button class="topbar-btn" onclick="replyMail()" title="Répondre"><i class="fa fa-reply"></i></button>
<button class="topbar-btn" onclick="deleteMail()" title="Supprimer" style="color:var(--accent2);"><i class="fa fa-trash"></i></button>
{% endblock %}
{% block content %}
<div style="max-width:860px;margin:0 auto;">
  <div style="margin-bottom:20px;">
    <a href="javascript:history.back()" class="btn btn-ghost btn-sm"><i class="fa fa-arrow-left"></i> Retour</a>
  </div>
  <div class="card" id="mailCard">
    <div class="card-body" style="padding:40px;display:flex;flex-direction:column;align-items:center;gap:12px;color:var(--text-muted);">
      <div class="loader"></div>
      <p style="font-size:13px;">Chargement du mail...</p>
    </div>
  </div>
</div>
<script>
const uid = {{ uid }};
const folder = '{{ folder }}';
document.addEventListener('DOMContentLoaded', loadMail);

async function loadMail() {
  const res = await fetch(`/api/mail/${uid}?folder=${encodeURIComponent(folder)}`);
  const m = await res.json();
  const card = document.getElementById('mailCard');
  if (m.error) {
    card.innerHTML = `<div class="card-body" style="text-align:center;padding:60px;color:var(--accent2);"><i class="fa fa-circle-xmark" style="font-size:40px;margin-bottom:12px;"></i><p>${m.error}</p></div>`;
    return;
  }
  card.innerHTML = `
    <div class="card-body" style="padding:32px;">
      <h1 style="font-size:22px;font-weight:800;color:var(--text);margin-bottom:24px;line-height:1.3;">${esc(m.subject)}</h1>
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--border);">
        <div class="avatar" style="background:linear-gradient(135deg,var(--primary),var(--accent2));">  ${esc(m.from)[0].toUpperCase()}</div>
        <div style="flex:1;">
          <div style="font-size:14px;font-weight:600;color:var(--text);">${esc(m.from)}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">À : ${esc(m.to)}</div>
        </div>
        <div style="font-size:12px;color:var(--text-dim);">${m.date || ''}</div>
      </div>
      <div style="color:var(--text);font-size:14px;line-height:1.7;">
        ${m.body_html
          ? `<iframe srcdoc="${escAttr(m.body_html)}" sandbox="allow-same-origin" style="width:100%;min-height:400px;border:none;background:white;border-radius:8px;"></iframe>`
          : `<pre style="font-family:var(--font);white-space:pre-wrap;word-break:break-word;">${esc(m.body_text)}</pre>`
        }
      </div>
      <div style="display:flex;gap:10px;margin-top:28px;padding-top:20px;border-top:1px solid var(--border);">
        <button class="btn btn-primary" onclick="replyMail()"><i class="fa fa-reply"></i> Répondre</button>
        <button class="btn btn-danger" onclick="deleteMail()"><i class="fa fa-trash"></i> Supprimer</button>
        <a href="/inbox" class="btn btn-ghost"><i class="fa fa-arrow-left"></i> Retour boîte</a>
      </div>
    </div>`;
}

function replyMail() {
  const subj = document.querySelector('h1')?.textContent || '';
  const from = document.querySelector('[style*="font-weight:600"]')?.textContent || '';
  window.location = `/compose?reply_to=${encodeURIComponent(from)}&subject=${encodeURIComponent('Re: '+subj)}`;
}

async function deleteMail() {
  if (!confirm('Supprimer ce mail ?')) return;
  const res = await fetch(`/api/mail/${uid}/delete?folder=${encodeURIComponent(folder)}`, {method:'POST'});
  const data = await res.json();
  if (data.success) window.location = '/inbox';
  else alert(data.error || 'Erreur');
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return String(s).replace(/"/g,'&quot;'); }
</script>
{% endblock %}
