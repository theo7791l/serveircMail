{% extends 'base.html' %}
{% block title %}Rédiger - {{ site_name }}{% endblock %}
{% block content %}
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <div class="s-logo-icon">✉</div>
                <span class="s-logo-text">{{ site_name }}</span>
            </div>
        </div>
        <div class="user-badge">
            <div class="user-avatar">{{ email[0].upper() if email else '?' }}</div>
            <div class="user-info">
                <span class="user-email">{{ email }}</span>
                <span class="user-status"><span class="status-dot"></span> En ligne</span>
            </div>
        </div>
        <button class="btn-compose active" onclick="window.location='/compose'">✏️ Nouveau mail</button>
        <nav class="sidebar-nav">
            <a class="nav-item" href="/inbox"><span class="nav-icon">📥</span><span>Boîte de réception</span></a>
        </nav>
        <div class="sidebar-footer">
            <a href="/logout" class="btn-logout">🚪 Déconnexion</a>
        </div>
    </aside>
    <main class="main-content compose-view">
        <div class="compose-card" data-animate="fadeInUp">
            <div class="compose-header">
                <h2>✏️ Nouveau message</h2>
                <div class="compose-from">De : <strong>{{ email }}</strong></div>
            </div>
            <div class="compose-body">
                <div class="compose-field">
                    <label>À :</label>
                    <input type="email" id="toInput" value="{{ reply_to }}" placeholder="destinataire@example.com" required>
                </div>
                <div class="compose-field">
                    <label>Sujet :</label>
                    <input type="text" id="subjectInput" value="{{ subject }}" placeholder="Objet du message">
                </div>
                <div class="compose-editor">
                    <div class="editor-toolbar">
                        <button type="button" onclick="fmt('bold')"><b>B</b></button>
                        <button type="button" onclick="fmt('italic')"><i>I</i></button>
                        <button type="button" onclick="fmt('underline')"><u>U</u></button>
                        <span class="toolbar-sep"></span>
                        <button type="button" onclick="fmt('insertUnorderedList')">• Liste</button>
                        <button type="button" onclick="fmt('insertOrderedList')">1. Liste</button>
                        <span class="toolbar-sep"></span>
                        <button type="button" onclick="toggleHtml()" id="htmlToggle">HTML</button>
                    </div>
                    <div id="editorArea" class="editor-area" contenteditable="true"></div>
                </div>
                <div class="compose-actions">
                    <button class="btn-send" id="sendBtn" onclick="sendMail()">
                        <span class="btn-text">Envoyer</span>
                        <span class="btn-icon">🚀</span>
                    </button>
                    <button class="btn-discard" onclick="window.location='/inbox'">✕ Annuler</button>
                </div>
                <div class="send-status" id="sendStatus"></div>
            </div>
        </div>
    </main>
</div>
<script>
function fmt(cmd) { document.execCommand(cmd, false, null); }
let htmlMode = false;
function toggleHtml() {
    const area = document.getElementById('editorArea');
    htmlMode = !htmlMode;
    document.getElementById('htmlToggle').classList.toggle('active', htmlMode);
    if (htmlMode) {
        const raw = document.createElement('textarea');
        raw.id = 'htmlArea';
        raw.value = area.innerHTML;
        raw.className = 'editor-html';
        area.replaceWith(raw);
    } else {
        const raw = document.getElementById('htmlArea');
        const newArea = document.createElement('div');
        newArea.id = 'editorArea';
        newArea.className = 'editor-area';
        newArea.contentEditable = 'true';
        newArea.innerHTML = raw.value;
        raw.replaceWith(newArea);
    }
}
async function sendMail() {
    const to = document.getElementById('toInput').value;
    const subject = document.getElementById('subjectInput').value;
    const isHtml = htmlMode;
    const body = htmlMode ? document.getElementById('htmlArea').value : document.getElementById('editorArea').innerHTML;
    if (!to) { showStatus('❌ Destinataire requis', 'error'); return; }
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.querySelector('.btn-text').textContent = 'Envoi...';
    btn.querySelector('.btn-icon').textContent = '⏳';
    const res = await fetch('/api/send', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({to, subject, body, html: isHtml})
    });
    const data = await res.json();
    if (data.success) {
        showStatus('✅ Mail envoyé avec succès !', 'success');
        setTimeout(() => window.location='/inbox', 1500);
    } else {
        showStatus('❌ ' + (data.error || 'Erreur inconnue'), 'error');
        btn.disabled = false;
        btn.querySelector('.btn-text').textContent = 'Envoyer';
        btn.querySelector('.btn-icon').textContent = '🚀';
    }
}
function showStatus(msg, type) {
    const el = document.getElementById('sendStatus');
    el.textContent = msg;
    el.className = 'send-status ' + type;
    el.style.display = 'flex';
}
</script>
{% endblock %}
